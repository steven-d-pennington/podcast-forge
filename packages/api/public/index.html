<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Podcast Forge Sources</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Podcast Forge</h1>
        <p id="status">Loading sources...</p>
      </div>
      <div class="actions inline">
        <button id="importLegacy" class="secondary" type="button">Import Legacy</button>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <label class="field">
          <span>Show</span>
          <select id="showSelect"></select>
        </label>
        <div class="actions">
          <button id="newShowToggle" class="secondary" type="button">New Show</button>
        </div>
        <section>
          <div class="section-title">
            <h2>Source Profiles</h2>
          </div>
          <div id="profileList" class="list"></div>
        </section>
      </aside>

      <section class="workspace">
        <form id="showSetupForm" class="panel setup-form" hidden>
          <div class="panel-heading">
            <div>
              <h2>New Show Setup</h2>
              <p id="showSetupMeta"></p>
            </div>
            <label class="field compact-field">
              <span>Status</span>
              <select id="showSetupStatus">
                <option value="draft">draft</option>
                <option value="active">active</option>
              </select>
            </label>
          </div>

          <div class="grid">
            <label class="field">
              <span>Name</span>
              <input id="showName" type="text" required>
            </label>
            <label class="field">
              <span>Slug</span>
              <input id="showSlug" type="text" pattern="[a-z0-9]+(-[a-z0-9]+)*" required>
            </label>
            <label class="field">
              <span>Host voice</span>
              <input id="showHostVoice" type="text" placeholder="Nova" required>
            </label>
          </div>

          <label class="field">
            <span>Description</span>
            <textarea id="showDescription" rows="2" required></textarea>
          </label>

          <div class="grid two">
            <label class="field">
              <span>Tone and style</span>
              <textarea id="showToneNotes" rows="3"></textarea>
            </label>
            <label class="field">
              <span>Script format</span>
              <textarea id="showScriptNotes" rows="3"></textarea>
            </label>
          </div>

          <div class="grid">
            <label class="field">
              <span>Feed title</span>
              <input id="showFeedTitle" type="text" required>
            </label>
            <label class="field">
              <span>Feed URL</span>
              <input id="showFeedUrl" type="url">
            </label>
            <label class="field">
              <span>Public asset base</span>
              <input id="showPublicBase" type="url">
            </label>
          </div>

          <div class="grid">
            <label class="field">
              <span>RSS output path</span>
              <input id="showOutputPath" type="text" placeholder="feeds/show.xml">
            </label>
            <label class="field">
              <span>Starter source query</span>
              <input id="showSourceQuery" type="text">
            </label>
            <label class="field">
              <span>Publishing mode</span>
              <select id="showPublishingMode">
                <option value="approval-gated">approval-gated</option>
                <option value="autopublish-later">autopublish-later</option>
              </select>
            </label>
          </div>

          <div class="grid">
            <label class="field">
              <span>Model provider</span>
              <input id="showModelProvider" type="text" value="openai" required>
            </label>
            <label class="field">
              <span>Model</span>
              <input id="showModelName" type="text" value="gpt-5.5" required>
            </label>
            <label class="field">
              <span>Reasoning</span>
              <input id="showReasoningEffort" type="text" value="high">
            </label>
          </div>

          <div class="actions">
            <button id="cancelShowSetup" class="secondary" type="button">Cancel</button>
            <button type="submit">Create Show</button>
          </div>
        </form>

        <form id="profileForm" class="panel" hidden>
          <div class="panel-heading">
            <div>
              <h2 id="profileTitle">Source profile</h2>
              <p id="profileMeta"></p>
            </div>
            <label class="toggle">
              <input id="profileEnabled" type="checkbox">
              <span>Enabled</span>
            </label>
          </div>

          <div class="grid">
            <label class="field">
              <span>Name</span>
              <input id="profileName" type="text" required>
            </label>
            <label class="field">
              <span>Slug</span>
              <input id="profileSlug" type="text" required>
            </label>
            <label class="field">
              <span>Type</span>
              <select id="profileType">
                <option value="brave">brave</option>
                <option value="rss">rss</option>
                <option value="manual">manual</option>
                <option value="local-json">local-json</option>
              </select>
            </label>
            <label class="field">
              <span>Weight</span>
              <input id="profileWeight" type="number" min="0" step="0.001" required>
            </label>
            <label class="field">
              <span>Freshness</span>
              <input id="profileFreshness" type="text" placeholder="pd, pw, pm">
            </label>
          </div>

          <div class="grid two">
            <label class="field">
              <span>Include domains</span>
              <textarea id="profileIncludeDomains" rows="3"></textarea>
            </label>
            <label class="field">
              <span>Exclude domains</span>
              <textarea id="profileExcludeDomains" rows="3"></textarea>
            </label>
          </div>

          <div class="actions">
            <button id="ingestProfile" class="secondary" type="button" hidden>Ingest RSS</button>
            <button type="submit">Save Profile</button>
          </div>
        </form>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <h2>Manual URL</h2>
              <p id="manualResult"></p>
            </div>
          </div>
          <form id="manualForm" class="manual-form">
            <label class="field">
              <span>URL</span>
              <input id="manualUrl" type="url" required>
            </label>
            <label class="field">
              <span>Title</span>
              <input id="manualTitle" type="text">
            </label>
            <label class="field">
              <span>Source</span>
              <input id="manualSourceName" type="text">
            </label>
            <label class="field wide">
              <span>Summary</span>
              <textarea id="manualSummary" rows="2"></textarea>
            </label>
            <div class="actions wide">
              <button type="submit">Submit URL</button>
            </div>
          </form>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <h2>Model Profiles</h2>
              <p id="modelMeta"></p>
            </div>
          </div>
          <div id="modelProfileList" class="model-grid"></div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <h2>Story Candidates</h2>
              <p id="candidateMeta"></p>
            </div>
          </div>
          <div id="candidateList" class="record-list"></div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <h2>Scheduled Pipelines</h2>
              <p id="schedulerMeta"></p>
            </div>
          </div>
          <div id="schedulerList" class="record-list"></div>
          <div id="failedScheduleRuns" class="scheduler-failures"></div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <h2>Episodes</h2>
              <p id="episodeMeta"></p>
            </div>
          </div>
          <div id="episodeList" class="record-list"></div>
        </section>

        <section id="queriesPanel" class="panel" hidden>
          <div class="panel-heading">
            <div>
              <h2>Queries</h2>
              <p id="queryCount"></p>
            </div>
          </div>
          <form id="newQueryForm" class="new-query">
            <textarea id="newQueryText" rows="2" placeholder="New query text" required></textarea>
            <button type="submit">Create Query</button>
          </form>
          <div id="queryList" class="query-list"></div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <h2>Scripts</h2>
              <p id="scriptMeta"></p>
            </div>
          </div>
          <form id="scriptGenerateForm" class="script-generate">
            <label class="field">
              <span>Research packet ID</span>
              <input id="scriptResearchPacketId" type="text" required>
            </label>
            <label class="field">
              <span>Format</span>
              <input id="scriptFormat" type="text" placeholder="feature-analysis">
            </label>
            <button type="submit">Generate Script</button>
          </form>
          <div class="script-workspace">
            <div id="scriptList" class="list"></div>
            <form id="scriptEditForm" class="script-editor" hidden>
              <label class="field">
                <span>Title</span>
                <input id="scriptTitle" type="text" required>
              </label>
              <label class="field">
                <span>Body</span>
                <textarea id="scriptBody" rows="16" required></textarea>
              </label>
              <div class="actions">
                <button id="approveScript" class="secondary" type="button">Approve for Audio</button>
                <button type="submit">Save New Revision</button>
              </div>
              <section id="productionPanel" class="production-panel" hidden>
                <div class="panel-heading compact">
                  <div>
                    <h3>Production</h3>
                    <p id="productionMeta"></p>
                  </div>
                  <div class="actions inline">
                    <button id="generateAudioPreview" class="secondary" type="button">Preview MP3</button>
                    <button id="generateCoverArt" class="secondary" type="button">Cover Art</button>
                  </div>
                </div>
                <div id="productionJobs" class="production-jobs"></div>
                <div id="productionAssets" class="production-assets"></div>
              </section>
            </form>
          </div>
        </section>
      </section>
    </main>

    <script type="module" src="/ui.js"></script>
  </body>
</html>
